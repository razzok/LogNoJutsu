id: T1046
name: Network Service Discovery (Port Scan)
description: Parallel port scan via PowerShell runspaces — creates a burst of simultaneous TCP connections from a single PID, matching real scanner behavior. Generates Sysmon EID 3 burst signature that behavioral SIEMs detect, unlike slow sequential scans which look nothing like real attacks.
tactic: discovery
technique_id: T1046
platform: windows
phase: discovery
elevation_required: false
expected_events:
  - event_id: 3
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "NetworkConnect - burst of simultaneous connections from powershell.exe PID"
  - event_id: 5156
    channel: "Security"
    description: "WFP allowed connections - rapid burst pattern"
  - event_id: 4104
    channel: "Microsoft-Windows-PowerShell/Operational"
    description: "PowerShell ScriptBlock - runspace port scan"
tags:
  - discovery
  - no-prereqs
  - network
executor:
  type: powershell
  command: |-
    Write-Host "[T1046] Network Service Discovery — parallel runspace port scan"
    $target = "127.0.0.1"
    $ports  = @(21,22,23,25,53,80,135,139,389,443,445,1433,3306,3389,5985,8080,8443)

    # Runspace pool scan — all ports hit simultaneously from one PID
    # Creates burst signature that matches Nmap/internal scanner behavior
    Write-Host "Parallel scanning $target ($($ports.Count) ports, 10 runspaces)..."
    $pool = [RunspaceFactory]::CreateRunspacePool(1, 10)
    $pool.Open()
    $jobs = @()
    foreach ($port in $ports) {
        $ps = [PowerShell]::Create()
        $ps.RunspacePool = $pool
        [void]$ps.AddScript({
            param($h,$p)
            try {
                $tcp = New-Object System.Net.Sockets.TcpClient
                $async = $tcp.BeginConnect($h,$p,$null,$null)
                if ($async.AsyncWaitHandle.WaitOne(300,$false)) {
                    $tcp.EndConnect($async); "$h`:$p OPEN"
                }
                $tcp.Close()
            } catch {}
        }).AddArgument($target).AddArgument($port)
        $jobs += [PSCustomObject]@{ PS=$ps; H=$ps.BeginInvoke() }
    }
    $results = $jobs | ForEach-Object { $_.PS.EndInvoke($_.H); $_.PS.Dispose() }
    $pool.Close()
    $results | Where-Object { $_ } | ForEach-Object { Write-Host "  [OPEN] $_" }

    # Gateway scan — different Sysmon network event context
    try {
        $gw = (Get-NetRoute -DestinationPrefix "0.0.0.0/0" -ErrorAction Stop | Select-Object -First 1).NextHop
        if ($gw -and $gw -ne "0.0.0.0") {
            Write-Host "Gateway scan: $gw"
            foreach ($p in @(80,443,3389)) {
                Test-NetConnection -ComputerName $gw -Port $p -WarningAction SilentlyContinue -InformationLevel Quiet 2>$null | Out-Null
            }
        }
    } catch {}
    Write-Host "[T1046] Complete. Sysmon EID 3 burst from PID $PID."
cleanup: ""
