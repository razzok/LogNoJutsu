id: T1098
name: Account Manipulation — Add to Privileged Group
description: Adds an account to the local Administrators group, simulating privilege escalation via group membership manipulation. Generates Event 4728/4732 (member added to security group) — core Exabeam Account Manipulation use case.
tactic: persistence
technique_id: T1098
platform: windows
phase: attack
elevation_required: true
expected_events:
  - "4732 (member added to local security group)"
  - "4728 (member added to global security group)"
  - "4688 (net.exe process creation)"
  - "4720 (if account created first)"
tags:
  - persistence
  - privilege-escalation
  - account-manipulation
  - requires-elevation
executor:
  type: powershell
  command: |
    Write-Host "[T1098] Account Manipulation - simulating privileged group membership change"
    $username = "lnj_test_acct"

    # Create the test account if it doesn't exist
    if (-not (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
        net user $username "LogNoJutsu!Temp2024" /add /comment:"LogNoJutsu test"
        Write-Host "Created test account: $username"
    }

    # Add to Administrators group (generates Event 4732)
    Write-Host "Adding '$username' to local Administrators group..."
    net localgroup Administrators $username /add 2>&1
    if ($LASTEXITCODE -eq 0) {
        Write-Host "Account added to Administrators. Event 4732 should be generated."
    } else {
        Write-Host "Note: Account may already be a member or insufficient privileges."
    }
    net localgroup Administrators 2>&1 | Select-String $username
cleanup: |
  $username = "lnj_test_acct"
  net localgroup Administrators $username /delete 2>$null
  net user $username /delete 2>$null
  Write-Host "Cleanup: Removed '$username' from Administrators and deleted account."
