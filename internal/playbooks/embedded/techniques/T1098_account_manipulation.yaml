id: T1098
name: Account Manipulation
description: Full account manipulation sequence — creates a test user, adds to Administrators (EID 4732), modifies account properties (EID 4738, PasswordNeverExpires), forces password change (EID 4723/4724), and cleans up. All three events (4732, 4738, 4723) are core Exabeam Account Manipulation use case triggers with 57 combined rules.
tactic: persistence
technique_id: T1098
platform: windows
phase: attack
elevation_required: true
expected_events:
  - event_id: 4720
    channel: "Security"
    description: "User account created"
  - event_id: 4732
    channel: "Security"
    description: "Member added to security-enabled local group — Administrators"
  - event_id: 4738
    channel: "Security"
    description: "User account changed — PasswordNeverExpires, flags modified"
  - event_id: 4688
    channel: "Security"
    description: "net.exe with 'localgroup Administrators ... /add'"
tags:
  - persistence
  - requires-elevation
executor:
  type: powershell
  command: |-
    Write-Host "[T1098] Account Manipulation — create, escalate, modify, password change"

    # Step 1: Create test user
    Write-Host "--- Step 1: Create test account (EID 4720) ---"
    net user LNJManipUser "P@ssw0rd123!" /add /comment:"Windows Service Account" /fullname:"Windows Update Agent" 2>&1 | Write-Host
    Write-Host "EID 4720 (account created) fired"

    # Step 2: Add to Administrators (EID 4732 — most important step)
    Write-Host "--- Step 2: Add to Administrators (EID 4732 — Exabeam Account Manipulation trigger) ---"
    net localgroup Administrators LNJManipUser /add 2>&1 | Write-Host
    Write-Host "EID 4732 fired: LNJManipUser added to Administrators"

    # Step 3: Modify account properties (EID 4738)
    Write-Host "--- Step 3: Account property modification (EID 4738) ---"
    Set-LocalUser -Name "LNJManipUser" -Description "Diagnostic Service Account" `
        -PasswordNeverExpires $true -UserMayNotChangePassword $true -ErrorAction SilentlyContinue
    Write-Host "EID 4738 fired: PasswordNeverExpires=True set"

    # Step 4: Password change via net user (EID 4723)
    Write-Host "--- Step 4: Account password change (EID 4723/4724) ---"
    net user LNJManipUser "NewP@ssw0rd456!" 2>&1 | Write-Host
    Write-Host "EID 4723 fired: password change for LNJManipUser"

    # Step 5: Disable then re-enable (EID 4725/4722)
    Write-Host "--- Step 5: Disable/re-enable account (EID 4725 + 4722) ---"
    net user LNJManipUser /active:no 2>&1 | Write-Host
    Write-Host "EID 4725 fired: account disabled"
    net user LNJManipUser /active:yes 2>&1 | Write-Host
    Write-Host "EID 4722 fired: account re-enabled"

    Write-Host "[T1098] Complete. EID 4720+4732+4738+4723 fired — full account manipulation chain."
cleanup: |-
  net localgroup Administrators LNJManipUser /delete 2>&1 | Out-Null
  net user LNJManipUser /delete 2>&1 | Out-Null
  Write-Host "Cleanup: LNJManipUser removed from Administrators and deleted."
