id: T1486
name: Data Encrypted for Impact (Ransomware Simulation)
description: Simulates ransomware pre-encryption behavior — creates test files, renames them with a fake encrypted extension, and drops a ransom note. No real encryption occurs. Generates Sysmon Events 11 (file creation) and matches ransomware behavioral patterns Exabeam monitors.
tactic: impact
technique_id: T1486
platform: windows
phase: attack
elevation_required: false
expected_events:
  - "Sysmon 11 (FileCreate - mass file creation/rename with unusual extension)"
  - "4688 (powershell.exe or cmd.exe)"
  - "4104 (PowerShell ScriptBlock - file operations)"
tags:
  - impact
  - ransomware
  - no-prereqs
executor:
  type: powershell
  command: |
    Write-Host "[T1486] Data Encrypted for Impact - Ransomware Simulation (NO real encryption)"

    $targetDir = "$env:TEMP\LogNoJutsu_RansomSim"
    $fakeExt   = ".lnj_encrypted"
    $noteFile  = "$targetDir\README_RESTORE_FILES.txt"

    # Step 1: Create test files (Sysmon Event 11 — mass FileCreate)
    Write-Host "--- Step 1: Creating test files for ransomware simulation ---"
    New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
    $fileNames = @("document.docx", "spreadsheet.xlsx", "presentation.pptx",
                   "database.mdb", "backup.bak", "report.pdf", "notes.txt",
                   "config.xml", "data.csv", "archive.zip")
    foreach ($name in $fileNames) {
        $content = "LogNoJutsu SIEM validation test file - $name - $(Get-Date)"
        Set-Content -Path "$targetDir\$name" -Value $content
    }
    Write-Host "Created $($fileNames.Count) test files in $targetDir"

    # Step 2: "Encrypt" files — rename with fake extension (Sysmon Event 11)
    Write-Host "--- Step 2: Renaming files with encrypted extension (behavioral ransomware pattern) ---"
    Get-ChildItem -Path $targetDir -File | Where-Object { $_.Extension -ne ".txt" } | ForEach-Object {
        $newName = $_.Name + $fakeExt
        Rename-Item -Path $_.FullName -NewName $newName
        Write-Host "  Renamed: $($_.Name) → $newName"
    }

    # Step 3: Drop ransom note (Sysmon Event 11 — ransom note creation)
    Write-Host "--- Step 3: Dropping ransom note (Sysmon Event 11) ---"
    $note = @"
!!! YOUR FILES HAVE BEEN ENCRYPTED !!!

THIS IS A SIMULATED RANSOMWARE ATTACK FOR SIEM VALIDATION PURPOSES.
Tool: LogNoJutsu | Technique: T1486 | Date: $(Get-Date)

NO REAL ENCRYPTION OCCURRED. All files renamed with extension: $fakeExt

In a real attack, this note would contain:
- Payment instructions (cryptocurrency wallet)
- Contact email for "negotiation"
- Deadline for payment
- Threat of data publication (double extortion)

SIEM validation check: Did your SIEM detect mass file rename/creation events?
"@
    Set-Content -Path $noteFile -Value $note
    Write-Host "Ransom note created: $noteFile"
    Write-Host "[T1486] Complete. Check Sysmon Event 11 for mass file operations."
cleanup: |
  $targetDir = "$env:TEMP\LogNoJutsu_RansomSim"
  if (Test-Path $targetDir) {
      Remove-Item -Path $targetDir -Recurse -Force
      Write-Host "Cleanup: Ransomware simulation directory removed."
  }
