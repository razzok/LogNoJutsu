id: T1486
name: Data Encrypted for Impact (Ransomware Simulation)
description: Full ransomware behavioral sequence — creates test files, AES-256 encrypts them via .NET (no external tools), appends .locked extension, deletes originals (Sysmon EID 23 file delete burst), drops a ransom note. The combination of mass file creation+encrypt+delete+ransom note is the exact behavioral chain Exabeam and behavioral EDR detect. Only affects files in TEMP test directory.
tactic: impact
technique_id: T1486
platform: windows
phase: attack
elevation_required: false
expected_events:
  - "Sysmon 11 (FileCreate - mass .locked file creation burst)"
  - "Sysmon 23 (FileDelete - original files deleted after encryption)"
  - "4104 (PowerShell ScriptBlock - RNGCryptoServiceProvider, CreateEncryptor, bulk file ops)"
  - "Windows Defender EID 1116/1117 (behavioral ransomware detection may trigger)"
tags:
  - impact
  - no-prereqs
executor:
  type: powershell
  command: |-
    Write-Host "[T1486] Ransomware Simulation — AES-256 encrypt + delete + ransom note"
    $testDir = "$env:TEMP\LNJ_T1486"
    New-Item -ItemType Directory -Path $testDir -Force | Out-Null

    # Create test files (only in simulation directory — no real files affected)
    Write-Host "Creating test files in $testDir..."
    1..10 | ForEach-Object { "Document content $_" | Out-File "$testDir\document_$_.txt" }
    1..5  | ForEach-Object { "Spreadsheet data $_" | Out-File "$testDir\report_$_.docx" }
    1..3  | ForEach-Object { "Config data $_"      | Out-File "$testDir\config_$_.xml"  }
    Write-Host "18 test files created"

    # AES-256 encryption via .NET — exact ransomware pattern (no external tools)
    # Generates Sysmon EID 11 (new .locked files) + EID 23 (delete originals)
    Write-Host "Encrypting files (AES-256 via .NET RNGCryptoServiceProvider)..."
    Add-Type -AssemblyName System.Security
    $key = New-Object byte[] 32
    $iv  = New-Object byte[] 16
    (New-Object System.Security.Cryptography.RNGCryptoServiceProvider).GetBytes($key)
    (New-Object System.Security.Cryptography.RNGCryptoServiceProvider).GetBytes($iv)
    $encrypted = 0
    Get-ChildItem -Path $testDir -File | ForEach-Object {
        $aes = [System.Security.Cryptography.Aes]::Create()
        $aes.Key = $key; $aes.IV = $iv
        $enc = $aes.CreateEncryptor()
        $inBytes  = [System.IO.File]::ReadAllBytes($_.FullName)
        $outBytes = $enc.TransformFinalBlock($inBytes, 0, $inBytes.Length)
        $encPath  = $_.FullName + ".locked"
        [System.IO.File]::WriteAllBytes($encPath, $outBytes)
        Remove-Item $_.FullName  # Original deletion = Sysmon EID 23
        $encrypted++
    }
    Write-Host "$encrypted files encrypted (.locked extension) + originals deleted"
    Write-Host "Sysmon EID 11 (file create burst) + EID 23 (file delete burst) generated"

    # Ransom note — behavioral indicator
    @"
YOUR FILES HAVE BEEN ENCRYPTED BY LOGNOJUTSU SIMULATION
This is a SIEM VALIDATION EXERCISE — no real encryption occurred on production files.
Test directory: $testDir
Contact: lognojutsu@simulation.test
"@ | Out-File "$testDir\README_DECRYPT.txt" -Force
    Write-Host "Ransom note dropped: $testDir\README_DECRYPT.txt"

    Write-Host "[T1486] Complete. File churn pattern (create+encrypt+delete) generated."
cleanup: |-
  Remove-Item -Path "$env:TEMP\LNJ_T1486" -Recurse -Force -ErrorAction Ignore
  Write-Host "Cleanup: All encrypted test files and ransom note removed."
