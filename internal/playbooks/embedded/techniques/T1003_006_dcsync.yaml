id: T1003.006
name: DCSync — Domain Credential Replication Simulation
description: Simulates DCSync reconnaissance by triggering DC replication channel events. Uses repadmin /syncall to generate Events 4928/4929/4932/4933 and LDAP queries for DS-Replication GUIDs (1131f6aa, 1131f6ad) which are the canonical DCSync indicators in all SIEM rules. Exabeam has 4 dedicated rules.
tactic: credential-access
technique_id: T1003.006
platform: windows
phase: attack
elevation_required: false
tier: 2
expected_events:
  - event_id: 4662
    channel: "Security"
    description: "DS object access - replication GUIDs 1131f6aa, 1131f6ad in Properties field"
  - event_id: 4928
    channel: "Security"
    description: "AD replication NC events via repadmin"
  - event_id: 4688
    channel: "Security"
    description: "nltest.exe, dsquery.exe, repadmin.exe"
  - event_id: 4769
    channel: "Security"
    description: "Kerberos TGS for DRSUAPI"
  - event_id: 4104
    channel: "Microsoft-Windows-PowerShell/Operational"
    description: "PowerShell ScriptBlock - LDAP replication attribute queries"
tags:
  - credential-access
  - active-directory
  - no-prereqs
executor:
  type: powershell
  command: |-
    Write-Host "[T1003.006] DCSync Simulation — replication rights enumeration + forced AD sync"

    # Step 1: DC enumeration — attacker finds DCSync target
    Write-Host "--- Step 1: DC enumeration via nltest (EID 4688 for nltest.exe) ---"
    nltest /dclist:$env:USERDOMAIN 2>&1 | Write-Host
    nltest /dsgetdc:$env:USERDOMAIN 2>&1 | Write-Host

    # Step 2: Force AD replication sync — triggers the same replication channel DCSync uses
    # Generates Events 4928/4929/4932/4933 on Domain Controllers
    Write-Host "--- Step 2: repadmin /syncall — triggers DC replication channel (EID 4928/4929/4932/4933) ---"
    repadmin /syncall /AdeP 2>&1 | Write-Host

    # Step 3: LDAP query for replication-capable attributes
    # DS-Replication-Get-Changes:         1131f6aa-9c07-11d1-f79f-00c04fc2dcd2
    # DS-Replication-Get-Changes-All:     1131f6ad-9c07-11d1-f79f-00c04fc2dcd2
    Write-Host "--- Step 3: LDAP replication attribute enumeration (triggers EID 4662 on DC) ---"
    try {
        $root = [ADSI]"LDAP://RootDSE"
        $domainDN = $root.defaultNamingContext
        Write-Host "Domain DN: $domainDN"
        $searcher = New-Object System.DirectoryServices.DirectorySearcher
        $searcher.Filter = "(objectClass=user)"
        $searcher.PropertiesToLoad.AddRange(@("msDS-KeyCredentialLink","distinguishedName","sAMAccountName"))
        $results = $searcher.FindAll()
        Write-Host "Replication attribute query: $($results.Count) user objects (EID 4662 with replication GUIDs fires on DC)"
    } catch {
        Write-Host "LDAP query result: $_"
    }

    # Step 4: dsquery for adminCount=1 accounts (privileged accounts DCSync targets)
    Write-Host "--- Step 4: dsquery privileged account enumeration (EID 4688 for dsquery.exe) ---"
    dsquery * -filter "(&(objectClass=user)(adminCount=1))" -attr sAMAccountName description 2>&1 | Select-Object -First 10 | Write-Host

    # Step 5: Domain ACL check for DS-Replication extended rights
    Write-Host "--- Step 5: Domain object ACL — check for DS-Replication rights (EID 4662) ---"
    try {
        $domainObj = [ADSI]"LDAP://$domainDN"
        $acl = $domainObj.ObjectSecurity
        $replRights = $acl.Access | Where-Object { $_.ActiveDirectoryRights -match "ExtendedRight" }
        Write-Host "ExtendedRight ACEs on domain object: $($replRights.Count) (includes replication rights)"
        $replRights | Select-Object IdentityReference, ActiveDirectoryRights | Select-Object -First 5 | ForEach-Object { Write-Host "  $_" }
    } catch {
        Write-Host "ACL check: $_"
    }
    Write-Host "[T1003.006] Complete. Check EID 4662 on DC (GUIDs 1131f6aa/1131f6ad) and EID 4928-4933."
siem_coverage:
  sentinel:
    - "Non Domain Controller Active Directory Replication"
cleanup: ""
