id: T1482
name: Domain Trust Discovery
description: Enumerates domain trusts using nltest /domain_trusts (verbatim in Ryuk/Trickbot/Cobalt Strike playbooks — standalone SIEM rule), .NET Forest/Domain trust APIs, dsquery, and LDAP trustedDomain object query. nltest /domain_trusts alone triggers detection in every major SIEM.
tactic: discovery
technique_id: T1482
platform: windows
phase: discovery
elevation_required: false
expected_events:
  - "4688 / Sysmon 1 (nltest.exe /domain_trusts — standalone tier-1 detection rule)"
  - "4688 (dsquery.exe with trustedDomain filter)"
  - "4662 (LDAP query accessing trusted domain objects)"
  - "4104 (PowerShell ScriptBlock - .NET Domain/Forest trust enumeration)"
tags:
  - discovery
  - active-directory
  - no-prereqs
executor:
  type: powershell
  command: |-
    Write-Host "[T1482] Domain Trust Discovery"

    # nltest /domain_trusts — appears verbatim in Ryuk, Trickbot, Cobalt Strike
    # This single command is a standalone detection rule in Exabeam, Splunk ES, Elastic
    Write-Host "--- nltest /domain_trusts (EID 4688 for nltest.exe — standalone SIEM rule) ---"
    nltest /domain_trusts 2>&1 | Write-Host
    nltest /trusted_domains 2>&1 | Write-Host
    nltest /dclist:$env:USERDNSDOMAIN 2>&1 | Write-Host

    # .NET Domain trust enumeration (no nltest — tests non-process detection)
    Write-Host "--- .NET Domain GetAllTrustRelationships ---"
    try {
        $domain = [System.DirectoryServices.ActiveDirectory.Domain]::GetCurrentDomain()
        $trusts = $domain.GetAllTrustRelationships()
        Write-Host "Domain trusts found: $($trusts.Count)"
        $trusts | Select-Object SourceName, TargetName, TrustType, TrustDirection | Format-Table
    } catch { Write-Host "Domain trust query: $_" }

    # .NET Forest trust enumeration
    Write-Host "--- .NET Forest GetAllTrustRelationships ---"
    try {
        $forest = [System.DirectoryServices.ActiveDirectory.Forest]::GetCurrentForest()
        $fTrusts = $forest.GetAllTrustRelationships()
        Write-Host "Forest trusts: $($fTrusts.Count)"
    } catch { Write-Host "Forest trust query: $_" }

    # LDAP trustedDomain object query (EID 4662 with DS-Query access type)
    Write-Host "--- LDAP trustedDomain enumeration (EID 4662 on DC) ---"
    try {
        $searcher = New-Object System.DirectoryServices.DirectorySearcher
        $searcher.Filter = "(objectClass=trustedDomain)"
        $searcher.PropertiesToLoad.AddRange(@("name","trustType","trustDirection"))
        $results = $searcher.FindAll()
        Write-Host "trustedDomain LDAP objects: $($results.Count)"
        $results | ForEach-Object { Write-Host "  Trust: $($_.Properties['name'])" }
    } catch { Write-Host "LDAP trust query: $_" }

    # dsquery trustedDomain (EID 4688 for dsquery.exe)
    Write-Host "--- dsquery trustedDomain (EID 4688 for dsquery.exe) ---"
    dsquery * -filter "(objectClass=trustedDomain)" -attr name trustType trustDirection 2>&1 | Write-Host

    Write-Host "[T1482] Complete. nltest.exe EID 4688 is the primary detection signal."
cleanup: ""
