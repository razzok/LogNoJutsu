id: T1218.011
name: Rundll32 Proxy Execution
description: Tests all major rundll32.exe LOLBin abuse patterns — url.dll OpenURL (most abused), pcwutl.dll LaunchApplication, advpack.dll INF execution, and shell32.dll. The rundll32.exe→cmd.exe parent-child chain is a tier-1 SIEM rule. Generates Sysmon EID 7 (DLL loaded) showing which DLL rundll32 used.
tactic: defense-evasion
technique_id: T1218.011
platform: windows
phase: attack
elevation_required: false
expected_events:
  - event_id: 1
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "rundll32.exe with DLL+entrypoint in CommandLine"
  - event_id: 7
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "ImageLoad — DLL loaded by rundll32: url.dll, pcwutl.dll, advpack.dll"
  - event_id: 3
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "NetworkConnect — if rundll32 makes HTTP request"
tags:
  - defense-evasion
  - lolbin
  - no-prereqs
executor:
  type: powershell
  command: |-
    Write-Host "[T1218.011] Rundll32 Proxy Execution — multiple LOLBin DLL patterns"
    $out = "$env:TEMP\lnj_rundll32"

    # Pattern 1: pcwutl.dll LaunchApplication — proxies process launch
    Write-Host "--- Pattern 1: pcwutl.dll LaunchApplication ---"
    rundll32.exe pcwutl.dll,LaunchApplication $env:SystemRoot\System32\cmd.exe 2>&1 | Write-Host
    Start-Sleep -Milliseconds 500

    # Pattern 2: url.dll OpenURL with HTA (most commonly abused pattern)
    # Creates temp HTA, loads via url.dll — generates EID 1 for rundll32+HTA child process
    Write-Host "--- Pattern 2: url.dll OpenURL (HTA execution) ---"
    $htaPath = "$out.hta"
    $htaContent = '<html><head><script language="VBScript">' + "`r`n"
    $htaContent += 'MsgBox "LogNoJutsu T1218.011", 64, "LogNoJutsu"' + "`r`n"
    $htaContent += 'window.close()' + "`r`n"
    $htaContent += '</script></head></html>'
    [System.IO.File]::WriteAllText($htaPath, $htaContent)
    rundll32.exe url.dll,OpenURL $htaPath 2>&1 | Write-Host
    Start-Sleep -Milliseconds 800

    # Pattern 3: shell32.dll Control_RunDLL (legitimate masquerade — tests content-based detection)
    Write-Host "--- Pattern 3: shell32.dll Control_RunDLL ---"
    rundll32.exe shell32.dll,Control_RunDLL timedate.cpl 2>&1 | Write-Host

    # Pattern 4: advpack.dll with INF (used by malware families — generates Sysmon EID 7 for advpack.dll)
    Write-Host "--- Pattern 4: advpack.dll LaunchINFSection ---"
    $infPath = "$out.inf"
    $infContent = "[version]`r`n[DefaultInstall]`r`n"
    [System.IO.File]::WriteAllText($infPath, $infContent)
    rundll32.exe advpack.dll,LaunchINFSection $infPath,,3,N 2>&1 | Write-Host

    Start-Sleep -Milliseconds 500
    Write-Host "[T1218.011] Complete. Sysmon EID 7 shows DLLs loaded; EID 1 shows rundll32 CommandLine."
cleanup: |-
  Remove-Item "$env:TEMP\lnj_rundll32*" -ErrorAction Ignore
  Write-Host "Cleanup: rundll32 test files removed."
