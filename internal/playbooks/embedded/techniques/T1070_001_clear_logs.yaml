id: T1070.001
name: Clear Windows Event Logs
description: "Creates a custom LogNoJutsu-Test event log channel, writes a test entry, then clears it via wevtutil — generating authentic System EID 104 (event log cleared) without destroying real Security/Application/System logs. The custom channel approach is safe for client machines while producing the same SIEM detection signature."
tactic: defense-evasion
technique_id: T1070.001
platform: windows
phase: attack
elevation_required: true
expected_events:
  - event_id: 104
    channel: "System"
    description: "Event log cleared — fired when LogNoJutsu-Test channel is cleared via wevtutil"
  - event_id: 4688
    channel: "Security"
    description: "wevtutil.exe process creation with 'cl' subcommand"
    contains: "wevtutil"
tags:
  - defense-evasion
  - requires-elevation
executor:
  type: powershell
  command: |-
    Write-Host "[T1070.001] Clear Windows Event Logs — safe custom channel approach"

    $logName = "LogNoJutsu-Test"

    # Step 1: Create custom event log channel
    Write-Host "--- Step 1: Create custom event log '$logName' ---"
    New-EventLog -LogName $logName -Source "LNJSource" -ErrorAction SilentlyContinue
    Write-EventLog -LogName $logName -Source "LNJSource" -EventId 1000 -Message "LogNoJutsu T1070.001 test entry" -EntryType Information
    Write-Host "Custom log created and test entry written"

    # Step 2: Clear via wevtutil (generates authentic System EID 104)
    Write-Host "--- Step 2: wevtutil cl (EID 104 in System log — authentic SIEM trigger) ---"
    wevtutil.exe cl $logName
    Write-Host "EID 104 fired for '$logName' clear — authentic event, no real log destroyed"

    Write-Host "[T1070.001] Complete. System EID 104 generated. No real logs were cleared."
cleanup: |-
  Remove-EventLog -LogName "LogNoJutsu-Test" -ErrorAction Ignore
  Write-Host "Cleanup: Custom event log channel 'LogNoJutsu-Test' removed."
