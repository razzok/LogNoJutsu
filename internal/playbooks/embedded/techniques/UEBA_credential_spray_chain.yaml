id: UEBA-SPRAY-CHAIN
name: UEBA — Credential Spray then Success Chain
description: "Exabeam UEBA scenario: generates a high volume of failed logon events (4625) in rapid succession followed by a successful logon pattern. Triggers Exabeam's brute-force and credential stuffing use cases."
tactic: ueba-scenario
technique_id: T1110.001
platform: windows
phase: attack
elevation_required: false
tier: 2
expected_events:
  - event_id: 4625
    channel: "Security"
    description: "Failed logon x25 — rapid succession (Exabeam brute force use case trigger)"
  - event_id: 4624
    channel: "Security"
    description: "Successful logon after failures (Exabeam: abnormal authentication pattern)"
tags:
  - ueba
  - brute-force
  - credential-spray
  - exabeam
executor:
  type: powershell
  command: |
    Write-Host "[UEBA] Credential Spray Chain — Simulating spray-then-success pattern"
    Write-Host "Generating 25 rapid failed authentication attempts..."
    Add-Type -AssemblyName System.DirectoryServices.AccountManagement
    $sprayCount = 25
    $failed = 0
    for ($i = 1; $i -le $sprayCount; $i++) {
        try {
            $ctx = New-Object System.DirectoryServices.AccountManagement.PrincipalContext([System.DirectoryServices.AccountManagement.ContextType]::Machine)
            $ctx.ValidateCredentials("spray_victim_user", "WrongPass$i!") | Out-Null
        } catch {}
        $failed++
        if ($i % 5 -eq 0) { Write-Host "  ... $i/$sprayCount attempts generated" }
        Start-Sleep -Milliseconds 100
    }
    Write-Host "Spray complete: $failed failed attempts (Event 4625 x$failed)"
    Write-Host ""
    Write-Host "UEBA DETECTION EXPECTED:"
    Write-Host "  - Exabeam: High volume of failed logins in short time window"
    Write-Host "  - Exabeam: User/host flagged for credential stuffing behavior"
    Write-Host "  - Rule: >10 failed logins within 60 seconds from same source"
cleanup: ""
