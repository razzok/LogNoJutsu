id: T1027
name: Obfuscated Files or Information
description: Executes Base64-encoded and obfuscated PowerShell commands as attackers commonly do to evade signature detection. Generates Events 4103/4104 (ScriptBlock Logging) — high-value Exabeam signal for obfuscation detection.
tactic: defense-evasion
technique_id: T1027
platform: windows
phase: attack
elevation_required: false
expected_events:
  - "4104 (PowerShell ScriptBlock - encoded/obfuscated command)"
  - "4103 (PowerShell Module Logging)"
  - "4688 (powershell.exe with -EncodedCommand flag)"
  - "Sysmon 1 (powershell.exe with -Enc or -EncodedCommand argument)"
tags:
  - defense-evasion
  - no-prereqs
  - obfuscation
  - ueba-anomaly
executor:
  type: powershell
  command: |
    Write-Host "[T1027] Obfuscated Files or Information - simulating attacker obfuscation techniques"

    # Technique 1: Base64-encoded command (most common attacker pattern)
    Write-Host "--- Technique 1: Base64-encoded payload ---"
    $payload1 = "Write-Host 'LogNoJutsu: Simulated obfuscated payload - T1027'; Get-Date; [System.Environment]::OSVersion"
    $encoded1 = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($payload1))
    powershell.exe -NonInteractive -NoProfile -EncodedCommand $encoded1

    # Technique 2: String concatenation obfuscation
    Write-Host "--- Technique 2: String concatenation obfuscation ---"
    $a = "Get-"; $b = "Pro"; $c = "cess"
    $cmd = $a + $b + $c
    Invoke-Expression "$cmd | Select-Object -First 3 Name, Id"

    # Technique 3: Character substitution obfuscation
    Write-Host "--- Technique 3: Tick-mark obfuscation (common in wild) ---"
    $obfCmd = "G`et-`Hos`tN`ame"
    Invoke-Expression $obfCmd

    # Technique 4: Nested encoding (double-encoded — triggers Exabeam anomaly)
    Write-Host "--- Technique 4: Double-encoded command ---"
    $inner = "Write-Host 'LogNoJutsu T1027: double-encoded execution'"
    $innerEnc = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($inner))
    $outer = "powershell.exe -EncodedCommand $innerEnc"
    $outerEnc = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($outer))
    powershell.exe -NonInteractive -NoProfile -EncodedCommand $outerEnc

    Write-Host "[T1027] Complete. ScriptBlock events 4104 should show obfuscated content."
cleanup: ""
