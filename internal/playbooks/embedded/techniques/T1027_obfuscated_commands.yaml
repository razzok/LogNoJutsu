id: T1027
name: Obfuscated Files or Information
description: Executes multiple attacker obfuscation patterns — Base64 -EncodedCommand, IEX string concat, format-operator, registry-stored payloads, and double-encoding. Matches documented Emotet/Cobalt Strike stager patterns. EID 4104 (ScriptBlock Logging) logs decoded content — the highest-value PowerShell SIEM event.
tactic: defense-evasion
technique_id: T1027
platform: windows
phase: attack
elevation_required: false
tier: 1
expected_events:
  - event_id: 4104
    channel: "Microsoft-Windows-PowerShell/Operational"
    description: "PowerShell ScriptBlock - decoded obfuscated content logged after deobfuscation"
  - event_id: 4103
    channel: "Microsoft-Windows-PowerShell/Operational"
    description: "PowerShell Module Logging - IEX calls visible"
  - event_id: 1
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "powershell.exe with -EncodedCommand -NoP -NonI -W Hidden -Exec Bypass"
  - event_id: 13
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "RegistryValueSet - HKCU payload storage"
tags:
  - defense-evasion
  - no-prereqs
  - obfuscation
  - ueba-anomaly
siem_coverage:
  crowdstrike:
    - "Suspicious Scripts and Commands"
    - "Script-Based Execution Monitoring"
executor:
  type: powershell
  command: |-
    Write-Host "[T1027] Obfuscated Files or Information — multi-pattern obfuscation simulation"

    # Pattern 1: Classic -EncodedCommand with attacker flags
    # -NoP -NonI -W Hidden -Exec Bypass combined = tier-1 SIEM alert in Exabeam/Splunk/Elastic
    Write-Host "--- Pattern 1: -EncodedCommand with full attacker flag set ---"
    $p1 = "Write-Host 'LogNoJutsu T1027: Base64 payload'; [System.Environment]::OSVersion.Version"
    $e1 = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($p1))
    powershell.exe -NoP -NonI -W Hidden -Exec Bypass -EncodedCommand $e1

    # Pattern 2: IEX + string concatenation (Invoke-Obfuscation style — matches Cobalt Strike stagers)
    Write-Host "--- Pattern 2: IEX + string concatenation obfuscation ---"
    $a = 'Wri'; $b = 'te-H'; $c = 'ost "LogNoJutsu T1027: concat obfuscation"'
    IEX ($a + $b + $c)

    # Pattern 3: Format operator obfuscation
    Write-Host "--- Pattern 3: -f format operator obfuscation ---"
    IEX ("{0}{1}{2}" -f 'Write','-Ho','st "LogNoJutsu T1027: format obfuscation"')

    # Pattern 4: Registry-stored payload — highly suspicious behavioral indicator
    # Generates Sysmon EID 13 (registry write) + EID 4104 (script block on retrieval+execute)
    Write-Host "--- Pattern 4: Registry-stored Base64 payload (Sysmon EID 13 + EID 4104) ---"
    $regPath = "HKCU:\SOFTWARE\LogNoJutsuT1027"
    $e2 = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes('Write-Host "LogNoJutsu T1027: registry-retrieved payload"'))
    New-Item -Path $regPath -Force | Out-Null
    Set-ItemProperty -Path $regPath -Name "update" -Value $e2 -Force
    $r = (Get-ItemProperty -Path $regPath -Name "update").update
    IEX ([Text.Encoding]::Unicode.GetString([Convert]::FromBase64String($r)))
    Remove-Item -Path $regPath -Force -ErrorAction Ignore

    # Pattern 5: Double-encoded command (nested encoding — Exabeam anomaly model trigger)
    Write-Host "--- Pattern 5: Double-encoded (nested) command ---"
    $inner = "Write-Host 'LogNoJutsu T1027: double-encoded execution'"
    $innerEnc = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($inner))
    $outer = "powershell.exe -NoLogo -NonInteractive -EncodedCommand $innerEnc"
    $outerEnc = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($outer))
    powershell.exe -NonInteractive -NoProfile -EncodedCommand $outerEnc

    Write-Host "[T1027] Complete. EID 4104 shows decoded script content; Sysmon EID 1 shows -Enc flag."
cleanup: |-
  Remove-Item -Path "HKCU:\SOFTWARE\LogNoJutsuT1027" -Force -ErrorAction Ignore
  Write-Host "Cleanup: Registry payload key removed."
