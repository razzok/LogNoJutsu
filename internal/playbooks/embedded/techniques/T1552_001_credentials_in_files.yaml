id: T1552.001
name: Credentials in Files
description: Simulates attacker credential file hunting — findstr /si password (EID 4688 for findstr.exe with /si = case-insensitive recursive, high-signal), dir /s /b for credential-named files, unattend.xml search, browser credential DB location checks (Chrome/Firefox), and PowerShell Select-String with credential patterns. Creates and discovers a fake credential file.
tactic: credential-access
technique_id: T1552.001
platform: windows
phase: attack
elevation_required: false
expected_events:
  - event_id: 4688
    channel: "Security"
    description: "findstr.exe with /si password — /si flag is the detection signal"
  - event_id: 4104
    channel: "Microsoft-Windows-PowerShell/Operational"
    description: "PowerShell ScriptBlock - Select-String pattern matching password/passwd/pwd"
tags:
  - credential-access
  - no-prereqs
executor:
  type: powershell
  command: |-
    Write-Host "[T1552.001] Credentials in Files — attacker file hunting simulation"

    # Create fake credential files first (to ensure search finds something realistic)
    $fakeConfig = "$env:TEMP\lnj_deploy_config.txt"
    $fakeBak    = "$env:TEMP\lnj_web.config.bak"
    "DB_PASSWORD=admin123`nAPI_KEY=sk-fake12345`nSERVICE_PASS=Winter2024!" | Out-File $fakeConfig
    "connectionString=Server=db01;Password=SecretPass;" | Out-File $fakeBak

    # findstr /si password — most common attacker search pattern
    # /s = recursive, /i = case insensitive — this combination is the detection signal
    Write-Host "--- findstr /si password (EID 4688 for findstr.exe with /si flag) ---"
    cmd /c "findstr /si password `"$env:TEMP\*.txt`" `"$env:TEMP\*.config`" `"$env:TEMP\*.bak`" 2>nul" | Write-Host
    cmd /c "findstr /si passwd `"$env:USERPROFILE\*.txt`" `"$env:USERPROFILE\*.xml`" 2>nul" | Select-Object -First 5 | Write-Host

    # dir /s /b for credential-named files
    Write-Host "--- dir /s /b for credential-named files (EID 4688 for cmd.exe) ---"
    cmd /c "dir /s /b `"$env:USERPROFILE\*pass*`" 2>nul" | Select-Object -First 5 | Write-Host
    cmd /c "dir /s /b `"$env:USERPROFILE\*cred*`" 2>nul" | Select-Object -First 5 | Write-Host
    cmd /c "dir /s /b C:\*unattend*.xml 2>nul" | Select-Object -First 3 | Write-Host

    # PowerShell recursive search (EID 4104 with credential pattern strings)
    Write-Host "--- Get-ChildItem + Select-String (EID 4104 with credential patterns) ---"
    Get-ChildItem -Path $env:TEMP -ErrorAction Ignore -Include "*.txt","*.xml","*.config","*.ini","*.bak" |
        Select-String -Pattern "password|passwd|pwd|secret|credential|api[_-]key" -ErrorAction Ignore |
        Select-Object Path, LineNumber, Line | Select-Object -First 10

    # Browser credential locations (attacker checks for stored passwords)
    Write-Host "--- Browser credential storage locations ---"
    $chromePath = "$env:LOCALAPPDATA\Google\Chrome\User Data\Default\Login Data"
    $ffPath     = "$env:APPDATA\Mozilla\Firefox\Profiles"
    Write-Host "Chrome Login Data exists: $(Test-Path $chromePath)"
    Write-Host "Firefox profiles exist:   $(Test-Path $ffPath)"
    Get-ChildItem -Hidden "$env:APPDATA\Microsoft\Credentials\" -ErrorAction Ignore | Select-Object Name, Length

    Write-Host "[T1552.001] Complete. findstr.exe /si and PS Select-String pattern events generated."
cleanup: |-
  Remove-Item "$env:TEMP\lnj_deploy_config.txt","$env:TEMP\lnj_web.config.bak" -ErrorAction Ignore
