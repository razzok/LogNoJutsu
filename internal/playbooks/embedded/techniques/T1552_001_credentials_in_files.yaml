id: T1552.001
name: Credentials in Files
description: Searches for credentials stored in plaintext configuration files, scripts, and common password-storage locations. Simulates attacker credential harvesting. Generates Event 4688 and 4104 (ScriptBlock Logging).
tactic: credential-access
technique_id: T1552.001
platform: windows
phase: attack
elevation_required: false
expected_events:
  - "4104 (PowerShell ScriptBlock - credential file search pattern)"
  - "4688 (powershell.exe or findstr.exe process creation)"
  - "Sysmon 1 (findstr/type commands with password-related arguments)"
  - "Sysmon 11 (FileCreate if found credentials are staged)"
tags:
  - credential-access
  - no-prereqs
executor:
  type: powershell
  command: |
    Write-Host "[T1552.001] Credentials in Files - simulating credential file search"

    # Common file locations attackers search for credentials
    $searchPaths = @(
        "$env:USERPROFILE",
        "$env:APPDATA",
        "C:\inetpub",
        "C:\xampp",
        "C:\wamp"
    )
    $credPatterns = @("password", "passwd", "pwd", "secret", "apikey", "api_key", "connectionstring")
    $credExtensions = @("*.xml", "*.ini", "*.config", "*.txt", "*.cfg", "*.conf", "*.ps1", "*.bat", "*.cmd")

    Write-Host "Searching for credential-containing files (common attacker patterns):"
    $found = 0
    foreach ($path in $searchPaths) {
        if (Test-Path $path) {
            foreach ($ext in $credExtensions) {
                try {
                    $files = Get-ChildItem -Path $path -Filter $ext -Recurse -Depth 3 -ErrorAction SilentlyContinue |
                             Select-Object -First 50
                    foreach ($file in $files) {
                        $content = Get-Content $file.FullName -ErrorAction SilentlyContinue -TotalCount 100
                        foreach ($pattern in $credPatterns) {
                            if ($content -match $pattern) {
                                Write-Host "  POTENTIAL CREDS: $($file.FullName) (matches: '$pattern')"
                                $found++
                                break
                            }
                        }
                    }
                } catch {}
            }
        }
    }
    Write-Host "Credential file search complete. $found potential file(s) found."

    # Also simulate findstr usage (generates Event 4688 for findstr.exe)
    Write-Host "--- Simulating findstr credential search (generates 4688) ---"
    cmd.exe /C "findstr /si password $env:USERPROFILE\*.xml $env:USERPROFILE\*.ini $env:USERPROFILE\*.txt 2>nul"
    cmd.exe /C "findstr /si password $env:APPDATA\*.config 2>nul"

    Write-Host "[T1552.001] Complete."
cleanup: ""
