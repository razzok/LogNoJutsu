  command: |
    Write-Host "[T1059.001] PowerShell Execution - Simulating encoded command execution"
    # Simulate encoded command (common attacker technique)
    $command = "Write-Host 'LogNoJutsu: Simulated attacker payload executed via encoded command'; Get-Date; whoami"
    $encoded = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($command))
    Write-Host "Executing encoded command (simulated attacker behavior)..."
    powershell.exe -NonInteractive -EncodedCommand $encoded
    # Simulate download cradle pattern (no actual download)
    Write-Host "Simulating IEX download cradle pattern..."
    $simulatedPayload = { Get-Process | Select-Object -First 5 }
    Invoke-Expression ($simulatedPayload.ToString())
cleanup: ""
