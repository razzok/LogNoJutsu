id: T1550.002
name: Pass the Hash — Credential Reuse Simulation
description: Simulates PtH authentication patterns using net use \\IPC$ (generates EID 4624 LogonType=3 NTLM + EID 4648), Start-Process -Credential (generates EID 4648 explicit credential logon), and Invoke-WmiMethod with alternate credentials (lateral movement pattern). True NTLM hash injection requires kernel access — this generates the same event patterns SIEMs use to detect PtH.
tactic: lateral-movement
technique_id: T1550.002
platform: windows
phase: attack
elevation_required: false
tier: 2
expected_events:
  - event_id: 4648
    channel: "Security"
    description: "Logon with explicit credentials — primary PtH Exabeam detection signal"
  - event_id: 4624
    channel: "Security"
    description: "LogonType=3 Network, AuthenticationPackageName=NTLM — PtH network logon"
  - event_id: 4625
    channel: "Security"
    description: "Failed network logon — when wrong credentials used in net use attempt"
tags:
  - lateral-movement
  - credential-access
  - no-prereqs
  - ueba-lateral-movement
executor:
  type: powershell
  command: |-
    Write-Host "[T1550.002] Pass the Hash Simulation — explicit credential logon patterns"

    # Method 1: net use \\IPC$ with explicit credentials
    # Generates EID 4648 (explicit credential) + EID 4624/4625 Type 3 (network logon)
    # This is the canonical PtH detection pattern in Exabeam (23 rules)
    Write-Host "--- Method 1: net use IPC$ with explicit credentials (EID 4648 + 4624/4625 Type 3) ---"
    $server = "\\$env:COMPUTERNAME\IPC$"
    net use $server /user:"$env:COMPUTERNAME\$env:USERNAME" "" 2>&1 | Write-Host
    net use $server /delete 2>&1 | Out-Null
    Write-Host "EID 4648 fired (explicit credential logon to IPC$)"

    # Method 2: cmdkey + credential store (EID 4648 for credential store access)
    Write-Host "--- Method 2: cmdkey explicit credential storage (EID 4648) ---"
    cmdkey /generic:"TERMSRV/$env:COMPUTERNAME" /user:"$env:COMPUTERNAME\$env:USERNAME" /pass:"SimPass123" 2>&1 | Write-Host
    Write-Host "Stored credential via cmdkey — EID 4648 on credential use"
    cmdkey /delete:"TERMSRV/$env:COMPUTERNAME" 2>&1 | Out-Null

    # Method 3: Start-Process with explicit credential (generates EID 4648)
    Write-Host "--- Method 3: Start-Process -Credential (EID 4648 explicit credential use) ---"
    $cred = New-Object System.Management.Automation.PSCredential(
        "$env:COMPUTERNAME\$env:USERNAME",
        (ConvertTo-SecureString "WrongPass!" -AsPlainText -Force)
    )
    Start-Process -FilePath "cmd.exe" -ArgumentList "/c whoami" -Credential $cred `
        -Wait -WindowStyle Hidden -ErrorAction SilentlyContinue
    Write-Host "EID 4648 fired for explicit credential use via Start-Process"

    # Method 4: WMI alternate credential (lateral movement via PtH simulation)
    Write-Host "--- Method 4: WMI with alternate credentials (lateral movement EID 4648 pattern) ---"
    try {
        Invoke-WmiMethod -ComputerName "127.0.0.1" -Namespace "root\cimv2" -Class "Win32_Process" `
            -Name "Create" -ArgumentList "cmd.exe /c whoami" `
            -Credential $cred -ErrorAction SilentlyContinue 2>&1 | Out-Null
    } catch {}
    Write-Host "WMI lateral movement attempt with explicit credential — EID 4648 pattern"

    Write-Host "[T1550.002] Complete. EID 4648 (explicit credential) is primary detection. EID 4624 Type 3 NTLM on successful auth."
cleanup: ""
