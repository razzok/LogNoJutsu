id: T1135
name: Network Share Discovery
description: Enumerates network shares using net view, net share, admin share access (generates EID 5140/5145 — network share access audit events), Get-SmbShare, and WMI. Admin share access (\\COMPUTER\C$, \\COMPUTER\ADMIN$) generates the highest-signal share events in SIEM rules.
tactic: discovery
technique_id: T1135
platform: windows
phase: discovery
elevation_required: false
tier: 3
expected_events:
  - event_id: 4688
    channel: "Security"
    description: "net.exe with view/share arguments"
  - event_id: 5140
    channel: "Security"
    description: "Network share accessed — admin share access"
  - event_id: 5145
    channel: "Security"
    description: "Network share object checked — file share audit"
  - event_id: 3
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "NetworkConnect to SMB port 445"
tags:
  - discovery
  - no-prereqs
  - network
executor:
  type: powershell
  command: |-
    Write-Host "[T1135] Network Share Discovery"

    # Local share enumeration
    Write-Host "--- Local shares (EID 4688 for net.exe) ---"
    net share 2>&1 | Write-Host
    Get-SmbShare -ErrorAction SilentlyContinue | Select-Object Name, Path, Description | Format-Table -AutoSize
    Get-WmiObject -Class Win32_Share | Select-Object Name, Path, Type | Format-Table -AutoSize

    # Domain/network share discovery
    Write-Host "--- Network share discovery (net view) ---"
    net view 2>&1 | Write-Host
    net view /all /domain 2>&1 | Write-Host
    net view \\$env:COMPUTERNAME 2>&1 | Write-Host

    # Admin share access — generates EID 5140 and 5145 (network share audit events)
    Write-Host "--- Admin share access (EID 5140/5145 — highest-signal share events) ---"
    dir \\$env:COMPUTERNAME\C$ 2>&1 | Select-Object -First 5 | Write-Host
    dir \\$env:COMPUTERNAME\ADMIN$ 2>&1 | Select-Object -First 5 | Write-Host
    dir \\$env:COMPUTERNAME\IPC$ 2>&1 | Write-Host

    Write-Host "[T1135] Complete. EID 5140 on admin share access; EID 4688 burst for net.exe."
cleanup: ""
