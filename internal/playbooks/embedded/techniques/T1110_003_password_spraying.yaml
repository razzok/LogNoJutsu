id: T1110.003
name: Password Spraying
description: Simulates password spraying — attempting a small number of common passwords against many accounts to avoid lockout. This technique has only 1 Exabeam rule despite being a critical attack vector, making it an important gap validation target. Generates Events 4625 (failed logon) and 4771 (Kerberos pre-auth failed).
tactic: credential-access
technique_id: T1110.003
platform: windows
phase: attack
elevation_required: false
expected_events:
  - "4625 (failed logon — multiple accounts)"
  - "4771 (Kerberos pre-authentication failed)"
  - "4776 (NTLM credential validation failed)"
  - "4688 (powershell.exe or net.exe)"
tags:
  - credential-access
  - no-prereqs
  - ueba-anomaly
executor:
  type: powershell
  command: |
    Write-Host "[T1110.003] Password Spraying - simulating low-and-slow credential attack"
    Write-Host "Note: Uses invalid credentials to generate Event 4625 WITHOUT locking accounts."

    # Gather local accounts to spray against (simulates attacker enumeration first)
    Write-Host "--- Step 1: Enumerating target accounts ---"
    $accounts = @()
    try {
        $accounts = Get-LocalUser | Where-Object { $_.Enabled } | Select-Object -ExpandProperty Name | Select-Object -First 10
        Write-Host "Found $($accounts.Count) local accounts to spray"
    } catch {
        $accounts = @($env:USERNAME, "Administrator", "Guest")
        Write-Host "Using default account list"
    }

    # Common weak passwords attackers spray (all will fail — simulation only)
    $commonPasswords = @("Password1", "Winter2024!", "Summer2024!", "Company123!")

    Write-Host "--- Step 2: Executing spray (one password per account — avoids lockout) ---"
    $failCount = 0
    foreach ($password in $commonPasswords[0..0]) {  # Only 1 password to keep it clean
        foreach ($account in ($accounts | Select-Object -First 5)) {
            Write-Host "  Spraying: $account (deliberate failure — Event 4625)"
            # Use Add-Type PrincipalContext for local auth attempt (generates 4625)
            Add-Type -AssemblyName System.DirectoryServices.AccountManagement
            try {
                $ctx = New-Object System.DirectoryServices.AccountManagement.PrincipalContext(
                    [System.DirectoryServices.AccountManagement.ContextType]::Machine)
                $result = $ctx.ValidateCredentials($account, $password + "_SPRAY_SIM_INVALID")
                if ($result) { Write-Host "  Unexpected success for $account" }
                else { $failCount++; Write-Host "  Failed: $account (Event 4625 generated)" }
            } catch {
                $failCount++
                Write-Host "  Auth attempt failed: $account"
            }
        }
        Start-Sleep -Milliseconds 500  # Brief delay — simulates low-and-slow pattern
    }
    Write-Host "Spray complete. $failCount failed authentication events generated."
    Write-Host "Exabeam check: Did rules for multiple account failures trigger?"
cleanup: ""
