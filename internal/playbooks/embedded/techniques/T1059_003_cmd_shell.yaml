id: T1059.003
name: Windows Command Shell (cmd.exe)
description: Simulates authentic attacker cmd.exe patterns — output redirection to files, stdin redirection (Raspberry Robin evasion), %COMSPEC% obfuscation, chained & commands, and the cmd.exe→powershell.exe parent-child chain. The last pattern (cmd spawning PS) is one of the most-triggered SIEM parent-child rules.
tactic: execution
technique_id: T1059.003
platform: windows
phase: attack
elevation_required: false
tier: 1
expected_events:
  - event_id: 4688
    channel: "Security"
    description: "cmd.exe with redirection operators, chained & commands in CommandLine"
  - event_id: 11
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "FileCreate — output redirect files"
  - event_id: 1
    channel: "Microsoft-Windows-Sysmon/Operational"
    description: "powershell.exe child of cmd.exe — high-signal parent-child chain"
  - event_id: 4104
    channel: "Microsoft-Windows-PowerShell/Operational"
    description: "PowerShell ScriptBlock when cmd spawns PS"
tags:
  - execution
  - no-prereqs
  - lolbin
siem_coverage:
  crowdstrike:
    - "Suspicious Scripts and Commands"
executor:
  type: powershell
  command: |-
    Write-Host "[T1059.003] Windows Command Shell — authentic attacker cmd.exe patterns"
    $out = "$env:TEMP\lnj_cmd_recon.txt"

    # Pattern 1: Output redirection with chained commands (EID 4688 for cmd.exe with & operator)
    Write-Host "--- Pattern 1: Chained recon commands with output redirection ---"
    cmd.exe /c "whoami /all > `"$out`" & ipconfig /all >> `"$out`" & net user >> `"$out`""
    Write-Host "Sysmon EID 11 fires for $out creation"

    # Pattern 2: Stdin redirection (Raspberry Robin / evasion pattern)
    Write-Host "--- Pattern 2: Stdin redirection (Raspberry Robin pattern) ---"
    "net localgroup administrators" | Out-File "$env:TEMP\lnj_cmd_in.txt" -Encoding ASCII
    cmd.exe /r "cmd < `"$env:TEMP\lnj_cmd_in.txt`"" 2>&1 | Write-Host

    # Pattern 3: %COMSPEC% environment variable obfuscation
    Write-Host "--- Pattern 3: COMSPEC obfuscation (malware evasion technique) ---"
    cmd.exe /c "%COMSPEC% /c set PROCESSOR_ARCHITECTURE" 2>&1 | Write-Host

    # Pattern 4: Chained & commands — single process, multiple operations
    Write-Host "--- Pattern 4: Chained attacker recon via & (one cmd.exe, many commands) ---"
    cmd.exe /c "echo T1059.003 & net user & net localgroup administrators & systeminfo" 2>&1 | Select-Object -First 20 | Write-Host

    # Pattern 5: cmd.exe spawning PowerShell — most-detected parent-child chain
    # cmd.exe -> powershell.exe = tier-1 SIEM rule (Sysmon EID 1 parent field)
    Write-Host "--- Pattern 5: cmd.exe spawning PowerShell (high-signal parent-child chain) ---"
    cmd.exe /c "powershell.exe -NoP -Exec Bypass -Command Write-Host 'LogNoJutsu T1059.003 cmd-to-ps chain'"

    Start-Sleep -Milliseconds 300
    if (Test-Path $out) { Get-Content $out | Select-Object -First 5 | Write-Host }
    Write-Host "[T1059.003] Complete. EID 4688 with cmd.exe CommandLine + cmd→PS parent chain."
cleanup: |-
  Remove-Item "$env:TEMP\lnj_cmd_recon.txt","$env:TEMP\lnj_cmd_in.txt" -ErrorAction Ignore
